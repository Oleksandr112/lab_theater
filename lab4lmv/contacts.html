<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти - Театр "Для всіх"</title>
    <meta name="description" content="Контакти нашого театру.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <div class="bg-blur">
        <img src="background.png" alt="Фон театру">
    </div>

    <header>
        <h1>КОНТАКТИ</h1>
        <nav>
            <a href="index.html">Головна</a>
            <a href="about.html">Про театр</a>
            <a href="schedule.html">Розклад</a>
            <a href="contacts.html" class="active">Контакти</a>
        </nav>
    </header>

    <main>
        <div class="red-box" style="display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap;">

            <div>
                <h2 style="text-align: left; margin-bottom: 10px;">Керівник:</h2>
                <div style="width: 200px; height: 250px; background-color: #ccc; margin-bottom: 15px;">
                    <img src="profile.jpg" style="width:100%; height:100%; object-fit:cover;" alt="Керівник">
                </div>
                <p>
                    Петренко Петро Петрович<br>
                    Контактні дані:<br>
                    +38(097)-123-45-67<br>
                    theaterPetro@gmail.com
                </p>
            </div>

            <div>
                <h2 style="text-align: left; margin-bottom: 10px;">Замовлення квитків:</h2>
                <p>
                    +38(067)23-56-678<br>
                    +38(093)45-67-890<br>
                    buytickets@gmail.com
                </p>

                <h3 style="color: #FFD700; margin-top: 30px; margin-bottom: 15px;">Написати нам</h3>
                <form id="contactForm">
                    <input type="text" id="userName" name="userName" placeholder="Ваше ім'я" required>
                    <input type="email" id="userEmail" name="userEmail" placeholder="Ваш Email" required>
                    <textarea id="userMessage" name="userMessage" rows="3" placeholder="Повідомлення" required></textarea>
                    <button type="submit">Відправити</button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Театр "Для всіх".</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const contactForm = document.getElementById('contactForm');

            if (contactForm) {
                contactForm.addEventListener('submit', function (event) {
                    event.preventDefault();
                    const name = document.getElementById('userName').value;
                    alert(`Дякуємо, ${name}! Ваше повідомлення успішно відправлену. Ми зв'яжемося з вами найближчим часом.`);
                    contactForm.reset();
                });
            }
        });
    </script>

</body>
</html>
